body:
  text: 僧成原名中觀根本慧論文句釋寶鬘論觀緣品第一法界空中恆放出辨法是非正法光遍知所知淨智焰衆生方慧蓮花友盡所有際作勝火燃燒三有諸稠林破除疑暗勝日輝願日親教恆增勝貪離而飾妙莊嚴瞋斷而持鋒利劍癡盡而捧妙經函敬禮勝者妙吉祥誰身衆寶所莊嚴如緑寶山星羅布觀者無厭悅意母敬禮本尊緑度母奪雪山光非尊身衆生服之甘露乳梵音和雅非尊語是攝他意之鐵鈎現見諸法非尊意大慈悲愍寶藏母具彼衆德非妙音敬禮唯一佛母尊善說恆河滙衆流却無自滿驕慢過不為名聞風動搖事業波鬘恆蕩漾淺識烏鴉雖遠離明智羣鵝常依止成辦諸龍智者願無分別海恆敬禮能仁八功德水經充滿龍樹智慧海出生中論白花園作盛開敷禮月稱善慧日光除障暗光大聖教蓮花園功德無等宗喀巴隨念師恩信毛豎從師善說正理海攝取文義成寶鬘金線連綴貫串已願為智者慧項飾譯者按以上四十句頌是僧成大師論前讚禮頌首讚禮釋迦佛二頌次讚禮妙吉祥菩薩一頌第三讚禮救度佛母一頌第四讚禮妙音佛母二頌第五讚禮龍樹菩薩二頌第六讚禮月稱菩薩一頌第七讚禮宗喀巴大師一頌第八造釋宗旨一頌釋中觀慧論分四一名義二翻譯敬禮三正釋論文四結尾義甲一名義梵語巴甲藏語喜饒漢語慧梵語納瑪藏語謝甲瓦漢語名為梵語瑪得瑪嘎藏語塢瑪漢語中梵語嘎日嘎藏語徹勒唔傑巴漢語頌合為中觀根本慧論頌甲二翻譯敬禮敬禮聖者妙吉祥童子甲三正釋論文分三一從佛說緣起離八邊門禮讚大師二釋緣起離八邊之理三念大師恩德而申敬禮乙一於誰敬禮誰說緣起圓滿大覺是諸說中第一者即於彼前敬禮彼如何說即開示在聖者根本智前無剎那滅之滅無成為一法之生無前相續斷之斷無相續之常無從遠處來無從近處去非義異非義一的真如能詮所詮等戲論寂滅生死無餘苦惱寂滅的涅槃何人敬禮即龍樹何時敬禮造論之先為何敬禮為自己隨順正士行如開示所化衆生於佛生淨信龍樹在造論之先從佛說緣起離八邊門禮讚大師有法前陳是有所為後陳為令了知大師超勝其餘諸說法者已於佛生清淨信心故因乙二釋緣起離八邊之理分三一示緣起自性空二示由通達緣起與未通達緣起即於生死中流轉和還滅之理三示通達緣起則惡見自行息滅之理丙初分二一正示二斷諍丁初正示分二一略示二無我二廣釋二無我戊初略示二無我分二一觀察因果作用已破法有自性二觀察去來作用已破補特伽羅有自性己初分二一破所生果中之生有自性二破能生因中之緣有自性庚初分二一破四邊生二斷破他生違教之諍辛一破四邊生問曰若謂先說不滅亦不生如何是緣起離八邊之理答曰由破生有自性其餘滅等易破今立破彼之宗云內外諸有為法有法無論何時何處何宗皆無有從自生否則犯再生無義和生無窮過故又有法如前無論何時何處何宗皆無從他生否則應從一切生一切故又彼有法無論何時不從自他共生何以故已分別破從自生和他生故又彼有法無論何時皆不從無因生否則有一切功用應成無義故辛二分二一斷諍二答難壬一斷諍自部諸實事師云自生和自他共生固不應理無因生之說更卑劣故皆不合理但汝說非從他一語若破他生即非善巧何以故世尊說諸有為法是從有自性的四緣而生故緣有四種即因緣所緣緣等無間緣增上緣更無第五緣是故破他生者違佛教義壬二答難諸有為法的自體有法在自芽未生時於緣種等中應非有因為爾時未現見故若許自未生時於緣等中非有則他生應非有自性因為自芽未生時於緣種等中自體非有故又彼芽有法在緣種未成時於緣等中應非有若在彼緣中有芽應成無因故若許未成時緣中無有芽則不從緣而生有自性的他法在緣等未成時自體非有是故破他生並不違佛教義何以故若實有從他生即是正理所破故庚二破能生因中之緣有自性分三一總破緣有自性二別破四緣有自性三示其他總破之理辛初分二一破由能作故執為緣二破由作業故執為緣壬初分二一破由能成辦生的作用執為緣二破由能生果執為緣癸一破由能成辦生的作用執為緣有分別者問曰由緣成辦作用由作用而生識答曰作用若是實有應不具緣作用非實有故沒有不具緣的作用否則果應從無因生故因此實有作用不能生識若謂由緣即能生識則眼等有法在勝義中非緣因為不具作用故問曰作用在勝義中有答曰勝義中不具作用勝義中無用故癸二破由能生果執為緣有云何須觀察具不具作用我是說由依眼等根而生眼等識故因此許眼等為緣若爾眼等有法在識未生以前應為緣因為由具有生識的作用即建立為緣故壬二破由作業故執為緣問曰種子是芽的緣因為依種子為緣而生芽故答曰芽在因位時無體則種子不能有自性地為緣芽尚無有種子又為何法的緣耶又芽在因位時有自體亦不應為緣何以故若自己在因位已有又何須用緣呢用緣無義故辛二別破四緣有自性分四一破因緣的相二破所緣緣的相三破等無間緣的相四破增上緣的相壬一破因緣的相問曰因緣有自性因為有它的相故能成辦果是因緣的相故答曰能生果是因緣的相然不可說有自性因為果法在因位時有無亦有亦無皆不成有自性故如是以因緣有相遂許因緣有自性不應道理壬二破所緣緣的相問曰所緣緣有自性因為是生識之處故答曰在緣所緣境以前已有的識上為所緣緣耶抑在緣所緣境以前未有的識上為所緣緣耶若如第一此識有法應當說是無所緣因為在緣所緣境以前已有故若如第二此識有法緣慮云何有自性因為在緣所緣境以前無故壬三破等無間緣的相問曰等無間緣有自性因為種子無間滅即是芽的等無間緣故答曰種子無間滅是芽的等無間緣不應道理因為芽等法未生以前種子不能滅故若謂種子已滅滅法則應不能為芽的等無間緣故壬四破增上緣的相問曰增上緣有自性由有此因即有彼果此因即是彼果的增上緣故答曰諸有為法有法若由此因而生彼果那就不是有自性因為汝增上緣之有即非由自性有故是無自性故辛三示其他總破之理一問曰緣有自性現見從紗生布故答曰此布果有法云何有自性地從紗緣而生呢應不生因為在彼紗等緣中本無布故彼紗等緣一一之中及聚合中均無布故問曰緣中雖無彼果但彼果是有自性地從彼等緣中而生答曰彼布果有法何故不從非緣生二問曰緣與果之體是異者誠如汝說但果即是緣之自體故無過答曰緣等有法自體非有自性是於自己衆多支分上假安立故若許緣等自體無有自性那麼彼果等有法應如緣的自體非由自性有諸緣自體非由自性有故若許緣的自體非由自性有則緣的有自性之果亦無問曰如此則果是非緣的自體答曰果有法由不是緣的自體亦不須是非緣的自體如由不是布的自體亦不須是草的自體故三問曰果雖不是緣非緣的自體但是緣及非緣二種決定各有自性如從芝麻出麻油不出酥油從酪出酥油不出麻油沙則酥油和麻油皆不出生故答曰所知指一切法有法緣及非緣應非決定各有自性因為緣及非緣之果皆無自性故觀去來品第二己二觀去來作用已破補特伽羅實有自性分二一廣釋二略結庚一廣釋分二一別破所作及作者中有作用二總破所作及作者中有作用辛一分四一觀所作已而破二觀作者已而破三觀有作用之能立已而破四觀作用已而破壬一分二一總破三時中有作用二別破正去時中有作用癸一總破三時中有作用問曰由破生已固能成立無滅等義今請別說於緣起中破去來之不共正理答曰去的作用若有自性須於三時中隨一而有且說已去時中不去由於去的作用是現在時已去時去的作用已滅故未去時中亦非有去的作用何以故去的作用是現在時未去時去的作用尚未生故正去時去的作用無有自性除已去未去則正去時有自性不可得故癸二別破正去時中有作用分二一牒諍二答難子一牒諍問曰正去時有去因為欲往何處時有舉足住足的動作即是有去彼動作只是正去時有已去非有未去亦非有故子二答難分二一去時與去二語一有去義一即無去義二若兩語都有去的意義即有太泛的過失丑一去時與去二語一有去義一即無去義正去時去的作用無有自性因為去的作用只有一個這個去的作用若在去時一語中有則去時即成無去的作用做若謂去的作用在後一語去字中有如此則承認去時去一語的後一個去字中有去的作用有法去時即無去的作用何以故去的作用只有一個這個去的作用已在去時去一語的後句去字中有故丑二若兩語都有去的意義即成太泛的過失若去時去前後兩句義中去的作用都有自性則有兩足的天授有法右腳應同時有安立與去兩個異體的作用因為既由有去的作用安立為去時又由誰補特伽羅往彼道去故有兩個有自性的去的作用若許有兩個作用那麼彼天授有法亦應成兩個去者因為有兩足的補特伽羅的右腳有兩個異體的去的作用故此又何故若無去者即不應有去故壬二觀作者已而破問曰去的作用有自性去之所依的去者有自性故答曰去之所依的去者不能有自性因為與去者異體的去法本來沒有故若謂有則去的作用應不待去者而有而實不然因為若無去者則去法不能成立故又去者有法非有自性何以故為下述正理破故非去者有法不去離去的作用故除去者與非去者外更無第三者去無有是事故問曰餘二非去者與第三去不去去者是有自性地去答曰說去者有自性地去不應道理因為若無去的作用即不應成為去者故若謂去者一語即含有去的作用那麼汝宗許去者一語中即含有去的作用有法則去的一語中應成無有去的作用的去者去因為去的作用只有一個汝許這個作用已在去者一語中有才許去者去故若謂去者與去兩語中均有去的作用那末兩足的天授有法右足應成兩種異體的安立和去的作用由彼作用顯示去者及由成為去者已而有去的作用故壬三觀有作用之能立已而破分五一破初去的發足二破去的時間三破不去的住四破返回五破有住之能立癸一破初去的發足問曰有去由舍住已將欲發足而去故答曰無論何時發足而去皆無自性已去時無去的發足未去時亦無去的發足正去時去的發足亦非有自性故發足去時無自性因為在去的發足以前住的時候既無正去的去時亦無已去在未去時更無去的發足故癸二破去的時間問曰三時中雖無去的發足但三時是有答曰已去正去和未去皆不應分別執為實有自性因為於三時中皆不見去的發足有自性故癸三破不去的住問曰有去去的反面有住故答曰住無自性因為去者不住不去者非有自性地住除去者與不去者別無第三者住故問曰初因不成由於去者是有自性地住故答曰皆非正理因為既去則不成去者去與住二種作用於一事中不同時有故癸四破返回問曰有去有從去返回故答曰去時非有自性地返回去時無自性故已去未去皆不返回於彼二中無去的作用故是故返回無自性癸五破有住之能立問曰住有自性因為住的反面有去故有將要住故有從住返回故答曰去將住和從住返回等有法不能成立住有自性與用去有自性之因成立住和去的發足以及從去返回等犯同類過失故壬四觀作用已而破分二一觀去者與去一異已而破二觀有否第二作用已而破癸一觀去者與去一異已而破問曰去者與去有自性現見天授邁步故答曰不應說彼去與去者是有自性地體一亦不應說去與去者有自性地體異何以不應說呢若說體一則作者與所作應成體一由於彼去即成去者故若是體異應成無去者的去與無去的去者於是可許去與去者是有自性地體異故去去者有法應無自性彼等有自性體一和有自性體異皆非有故癸二觀有否第二作用已而破問曰無有前過即由安立去者的作用而安立去故答曰彼能安立去者之去不能使去者去因某天授欲往何處去在起去的作用之前尚非去者故彼去法除顯示去者外不能使去者去因為一個去者不應有兩個去法故辛二總破所作及作者中有作用去者有法非有自性地去三時中不能有自性地去故不去者有法亦不去何以故三時中不能去故亦是去者亦是不去者亦不於三時中去無有是事故庚二略結去去者和所去之處有法皆非有自性觀察時不可得故觀根品第三戊二廣釋二無我分五一別釋法我及補特伽羅無我二法自性空三通達真實之理四時自性空五三有相續自性空己一別釋法我及補特伽羅無我分二一釋法無我二釋補特伽羅無我庚一釋法無我分二一破蘊處界三法上有我二破有我之能立辛一破蘊處界三法上有我分三一破處上法我二破蘊上法我三破界上法我壬一破處上法我分二一牒諍二示答癸一牒諍問曰去等雖無自性但限等是有自性對法經云能見能聞能嗅能嘗能觸和能了別等為六根彼等所行即說為所見等六境故癸二示答分二一破見的三法二由如是理類推餘法子初分二一破能見者二破所見的事及見的作用丑初分二一破眼是見者二破我或識是見者寅一破眼是見者彼見色的眼有法不能自見自對於自無能所故又見色的眼有法非有自性地見他因為不能自見故問曰雖不見自但能見他譬如火雖不自燒但能燒他答曰汝的火喻不能成立見有自性即用破已去未去去時中去有自性之理答破見等有自性之喻故又眼根有法非有自性地見因為見自見他無有少許是有自性地見故眼根有法見色說為有自性地見極不應理因為是非有自性地能見故若眼是能見的話那麼眼是見的自體呢或非見的自體呢若如第一則彼是見之自體的眼有法即非有自性地見沒有兩個見的作用故若如第二則非見之自體的眼有法即不能見因為離見的作用故寅二破我或識是見者問曰眼根非見者我或識是見者答曰我或識有法不是有自性的見者成立見無自性之理當知亦釋見者無自性故又見者有法由不離見知汝非有自性成立見者與否非有自性地觀待見故見者有法離見非有汝見者汝須觀待見而有故丑二破所見的事及見的作用問曰雖無見者但所見與見是有的答曰所見與見應無自性因為見者無自性故問曰所見與見有自性如云依父母生子而說依眼及色生識答曰此非中論本文藏譯中論本頌觀根品中此處有如說依父母而生彼兒子依眼根及色生識亦如是一頌宗喀巴大師所著的中論疏中說其餘三種印度釋論中皆無此頌當是翻譯時所依之版本有誤因此僧成大師說該頌非中論本文又漢譯中論本中亦無此頌識等四法非有自性所見與見無自性故若許識等四法無自性則取等亦無自性子二由如是理類推餘法問曰見雖無自性但聞等有自性答曰聞嗅嘗觸思量以及聞者和所聞等有法皆無自性由成立見無自性之理當知亦說耳等無自性故觀蘊品第四壬二破蘊上有法我分三一破色蘊有自性二由彼正理類知餘法三辨論和講解時答問者之軌則癸初分二一破異體因果二破因中有果無果及因果相似與不相似子一破異體因果問曰雖破根等但蘊是有自性未破故答曰除果色的因四大種外果色非有自性若除果色的因而果色有自性則果色應成無因但任何時處皆非有無因的色境故不但果色無自性即果色的因亦無自性因為若離果色有色因者色因則成無果因但無果的因終非有故子二破因中有果無果及因果相似四大種中有果色耶抑無果色耶若如第一謂有果色則四大種有法應不能為色果因因為四大種已有果色故若如第二謂無的果色則四大種有法亦非有自性地為色的因因為四大種中無有果色故問曰色因雖然沒有但果色是有答曰眼根有法不能為果色無因故在破無因生時曾兩次說唯不應不應有法是有意義為令了知無因生果之見最下劣故又於有對無對等色皆不應分別執有自性因為色無自性故果色有法與色因四大種非有自性地相似因為果色與四大種的相不同故果色有法與色因四大種亦非不相似由於果色是四大種的果色故癸二由彼正理類知餘法受想行識等諸有為法有法亦無自性由成立色無自性故受等諸法與色相同故癸三辨論和講解時答問者之軌則中觀師在論辨中立由自性空故色無自性之時諸實事師設若答以色有自性因為受有自性故等語皆非正答因為能立與所立相同故又講空性時若有弟子出過云色有自性因為受有自性故彼諸諍論皆非真能出過由於能立與所立相同故觀界品第五壬三破果上有法我分三一破空界有自性二由彼正理類知餘法三呵責有無邊見癸初分三一破空界上的能相所相二破有體無體三總結子一破空界上的能相所相問曰界有自性因為佛告大王當知此士夫補特伽羅是六界所成故答曰經中雖先說地界而此論中先破空界有自性者因為世間共許虛空為空不許餘界為空為了由世間共許之理成立不共許的義故云先說虛空相無質礙非有自性地為虛空相因為在虛空相的能相無質礙之前無有少許虛空故設若在能相無質礙之前有虛空那麼虛空則成無能相其實不爾因為於任何時處皆沒有無能相的所相法故能相無質礙非有自性地於何處轉因為在無能相之前所相的法非有故無能相處能相不轉沒有無能相的所相故有能相處能相亦非有自性地轉彼中不復需要能相轉故除有能相與無能相外更無別處有能相轉無有是事故所相非有自性因為能相轉無自性故能相亦非有自性因為所相無自性故所相應非有自性能相轉無自性故若許所相無自性則能相無質礙亦非有自性子二破有體無體毗婆沙師說云空界是有體答曰空界有法非有自性地為有體因為能相與所相皆無自性故此理決定離能相所相的有體法並非有故經部云空界為無體法是有自性答曰空界有法為無體法非有自性因為有體法無自性故問曰有體與無體皆有自性因為有了知有體無體之補特伽羅故答曰了知有體無體的補特伽羅有法本無自性有體無體和亦有體亦無體皆無自性故云何亦有體亦無體是無自性有體與無體二法不共有故子三總結空界有法彼為有體無體所相和能相皆無自性彼等諸義前已破故癸二由彼正理類知餘法其餘五界有法亦無自性與成立空界無自性之理相同故癸三呵責有無邊見諸邪見劣慧有法暫時不能現見所應見的息滅戲論及涅槃由見諸法為有自性及斷滅無故觀貪貪者品第六辛二破有我之能立因分三一破能依雜染二破生住滅三相三破業因與作者壬初分三一破貪與貪者有自性二總結三由此正理類知餘法癸初分二一破前後生二破同時生子一破前後生問曰蘊處界有自性因有能依雜染故答曰若貪有自性不越二種軌則而有即先有貪者後有貪或後有貪者先有貪若如第一先有貪者後有貪則應先有貪者而無貪因為若在貪之先有無貪的貪者即應依彼貪者而有貪如此因成先有貪者後有貪但是無有離開貪的貪者故若如第二後有貪者先有貪則無貪者云何有貪以無所依則能依非有故問曰貪者有自性未破故答曰貪者亦無自性貪者之先有貪或者無貪皆與破貪之先有貪者或無貪者的理相同故子二破同時生問曰貪與貪者同時俱有答曰貪與貪者有自性地同時生起不應道理因為若是有自性地同時生起則貪與貪者彼此互不相待故又貪與貪者是有自性的一體呢或異體呢若如第一體性是一即無同時俱有何以故彼與彼自己非同時俱有故若是有自性的異體亦不應為同為俱有若謂雖只一個亦是同時俱有那麼無體的一頭黃牛亦應成同時俱有又若謂雖是有自性的異體而是同時俱有則無體各別而住的黃牛亦應成同時俱有若謂有自性的異體上亦有同時俱有那麼貪與貪者有法非有自性的同時俱有因為若是有自性地體異固是同時俱有但是非有自性地體異故若謂貪與貪者是有自性的體異那末貪與貪者有法何故分別說為同時俱有如是分別不應道理故問曰單獨之異則不能成立由此貪者貪此所貪之境為了欲成此義而許同時俱有答曰那麼為了成立同時俱有又必須許自性體異因為單獨一個不能成立由此貪者貪著所貪之境故又貪與貪者有法不是有自性地同時俱有之法因為有自性的異體之法本來無故貪與貪者有法若是有自性的異體之法即不應許為同時俱有之法因為有自性的異體之法本來無故癸二總結由此觀之貪與貪者等有法無有自性因為同時俱有與非同時俱有皆無自性故癸三由此正理類知餘法一切諸法有法無有自性同時俱有與非同時俱有皆無自性故如貪及貪者等觀生住滅品第七壬二破生住滅三相有自性分三一破有為有自性二由此正理破無為有自性三斷違教之諍癸一破有為有自性分二一破總相二破別相子一破總相分二一總破二別破丑一總破分三一觀察是否有為已而破二觀個別與聚合已而破三觀有無餘相已而破寅一觀察是否有為已而破問曰蘊處界有為法有自性有生住滅有為相故答曰彼生有法亦應具有生等三相是有為故若謂生是無為則彼生有法應非是有為相寅二觀個別與聚合已而破生等三相個別不能作有為相因為沒有生的住滅非有故又生等三相不能在一法上同一時中有自性地聚合若是有自性地住則與滅相違故寅三觀有無餘相已而破分二一出過二破救卯一出過生住滅三法中是否更有生等有為相若有則生等相有法應成無窮若無則生等有法應非有為卯二破救分二一破第一救二破第二救辰一破第一救正量部云生等不成無為因為有生生等故亦無無窮過因為有本相與隨相彼此互相成辦故又若善法或煩惱法隨一生起時與本法共有十五法生起即彼法彼法的生成就住老無常若是煩惱法即有邪解脫若是善法即有正解脫若是出離法即有彼法之出離法若是非出離法即有彼法之非出離法此中以彼善法或煩惱法為主體彼法之生乃至非出離即是眷屬煩惱法共有八法善法亦然彼法之生的生成就的成就住的住老的老無常的無常若是煩惱法即有邪解脫的邪解脫若是非出離法即有非出離的非出離此是眷屬的眷屬共有七種彼十五法生生唯生本生本生亦能生生生故沒有無窮過答曰如此說來汝的生生能生本生但是汝的本生尚未生生生時則彼法不能生本生因為生生尚待本生而生故若謂由本生生生生即由彼生生生本生那末彼生生未生本生時此本生不能生生生因為此本生尚待生生生故若謂彼此正生時能互相生那末生生有法在正生本生時不能生汝生生因為若許未生之本生能生汝生生者固可但是汝正量部只許生時能生生生因此本生未生則不能生生生故辰二破第二救分二一牒救二破救巳一牒救若謂如燈明能照自他如是生亦能生自他有為法故沒有無為和無窮兩種過失巳二破救分二一破喻二破義午一破喻許燈明是有自性地照不應道理由能除暗乃名為照但是何處有燈明則彼處與燈皆無暗故若謂燈明正生時能除暗那末燈明正生時亦不是有自性地破暗因為燈明正生時不能有自性地到暗故若謂燈明雖未到暗亦能除暗那末一處有燈即能破除一切世間所有的暗若謂燈能自照亦能照其他之物因為它是能照故那末暗亦應無疑地既能障自亦能障他物因為它是能礙故午二破義彼生是已生耶抑是未生若是未生則此生有法自體非生尚未生故若生已而生則此生有法不應由自生已生故丑二別破分三一破生有自性二破住有自性三破滅有自性寅一破生有自性分三一觀三時已而破二觀有無亦有亦無已而破三觀是否正滅時已而破卯一觀三時已而破生無自性已生未生和正生時皆非有自性地生此義於前已去未去和正去時破去的作用有自性中已說故問曰依生的作用而正生時名生答曰亦不應說依生作用而正生時為有自性因為若已有生即無正生時故內部諸實事師云汝在表面上是講佛經其實即破壞了緣起法甚為可懼因為佛說此有故彼有此生故彼生以顯示緣起而汝則說已生未生生等語破壞生法故答曰生時與生皆自性寂滅無自性凡是緣起皆自性寂滅故問曰汝說若生法是有等語不應道理因為我約當生說由生法令生答曰生時亦非有自性地生因為若法在未生以前已有彼正生時固可為生但是彼法未生以前彼無有故復次今當問汝若由彼生法令生時生但是彼生又為那一個生法所生若謂另有一個生法生彼生法如是則生法無有窮盡若謂彼生法不待別的生法而生如是別一切有為法皆如彼生法亦不待別的生法而生卯二觀有無亦有亦無已而破生有法非有自性地生因為在自位時有有體與無無體皆非有生有無體共亦非有生如上已破故不繁說卯三觀是否正滅時已而破何法正滅時有法非有自性地生尚有滅故何法非正滅時有法過去未來亦不應生非有為法故如瓶已壞滅和未來瓶皆非瓶故寅二破住有自性已住法有法不住住的作用已滅故未住法有法非住離住的非用故法正住時亦非有自性地住住的作用沒有兩個故有為法有法非有自性地住因為生無自性故為有為法正滅時不是有自性地住住與滅的作用不共故非正滅法有法非有自性地住非有為法故不老不死而安住的有為法非有因為一切有為法於一切時中皆是有老死之法故住無自性自住他住皆不應理故如生不自生不他生寅三破滅有自性分五一觀三時已而破二觀是否住已而破三觀自他分位已而破四觀有體無體已而破五觀有無其他能滅已而破卯一觀三時已而破問曰生住有自性有滅故答曰滅若有自性不越三時而有已滅即不成滅過去與現在相違故未滅是在未來亦不成滅離滅故正滅亦非有自性地滅正滅無自性故諸有為法有法滅無自性先無自性故卯二觀是否住已而破有為法住時非有自性滅滅與住的作用於一事上相違故有為法自未住時不應言滅無有是事故卯三觀自他分位已而破滅無自性在自分位時不滅自分位在他分位時亦不滅他分位故諸有為法之滅皆無自性因為諸有為法之生無自性故卯四觀有體無體已而破有體非有自性地滅在一法上有體無體不能併有故無體亦不應有滅無體故譬如本無二頭云何言斷二頭卯五觀有無其他能滅已而破滅無自性非由自滅亦非由他滅故如生不自生亦不從他生子二破別相問曰雖破有為總相但堅溫暖動等別相是有答曰有為無自性因為生住滅等總相無自性是故別相亦無自性癸二由此正理破無為有自性問曰有為有自性因為有與有為法相違之無為法故答曰無為無自性因有為無自性故癸三斷違教之諍問曰生滅倘若無自性則與經說有為有生之義相違答曰不相違經說若生若住若滅之法皆如夢如幻如尋香城故觀著作及業品第八壬三破業與作者有自性分三一破業與作者有自性二名言中安立業與作者之理三由此理類知餘法癸一破業與作者有自性分二一破順品的作用二破違品的作用子一破順品的作用問曰有為法有自性有作業與作者故答曰定是作者非有自性地作定是業為下述正理所破故定非作者亦不作定非業亦為下述正理所破故如何破答曰應成不觀待作者的作業因為作者是有自性地作業故此理決定如是則作一業時應有二種異體作用但定是作者並無第二種作用故又應成無作業的作者作者有自性地作彼業故此理決定如是則作一業時應有二種異體作用但定是業並無第二種作用故若謂定非作者能作定非業則業與作者當成無因若許業與作者無因則因果亦不成立業與作者無因故若許因果不能成立即不應有所作作者和作業無因果故若許無所作作者和作業則不應有法善及非法惡無所作等故若許無法及非法則法及非法有法應無所生的果無有法及非法故若許無有從法及非法所生的果則應無解脫和增上生的道一切作業應成唐勞無功無果故亦是作者亦非作者不作亦是業與亦非業因為是作者與非作者在一法上決定非有彼此相違故子二破違品的作用定是作者不作定非業否則應有無作者的業及業無因之過故定非作者亦不作定是業否則當成作者無因及作者不作業的過故定是作者不作定非業和業非業否則當成無作者的業及業無因過如云是業與非業其因如上已說彼此相違故定非作者不能作定是業及業非業否則當成作者無因及作者不作業的過如云是業與非業其因如上已說亦是作者亦非作者不作業及非業否則亦成是業與非業作者不作業及亦成業無因過當知其因如上說故癸二名言中安立業與作者之理問曰作用若無自性當成無作用了答曰無如是過因為作者是依業而有業亦依作者而有除彼此互相觀待外不見別有成辦因故癸三由此正理類知餘法如是當知取等亦無自性因為業與作者無自性故其餘諸有為法有法當知無有自性因與作者及作業等之理相同故觀本住品第九庚二釋補特伽羅無我分二一正釋二破補特伽羅有自性的能立因辛一正釋分二一牒諍二答難壬一牒諍問曰有聲聞部云中論說取者亦如是極不合理因為眼耳等根及受等心所為緣而有取者取者在眼耳等根及受等心所之前已有如此則在彼等所取以前已有取者一法何以故若先無有取者一法則眼耳等根不能成為所取故頌文前一等字是攝鼻等餘根後一等字是攝其餘心所亦字是指其餘諸根及心所亦是屬此中所攝之義壬二答難分三一破取者有自性二破所取有自性三斷諍癸一破取者有自性分三一破取者在一切所取之前而有二破取者在一一所取之前而有三破一切所取之先有取者的能立因子一破取者在一切所取之前而有彼補特伽羅取者一法有法應無安立之因取者在眼耳等根和受等心所之前有故如是則未有彼補特伽羅之時亦應決定有眼耳等根及受等心所因為無有眼等之時亦可先有彼補特伽羅故其實不然何以故無有所取應無取者由有所取顯示取者故無有取者應無所取由有取者顯示所取故子二破取者在一一所取之前而有問曰非說補特伽羅在眼等一切之前而有是在一一所取之前而有如從眼等根中由眼見色顯示有補特伽羅時餘根則不顯示餘耳鼻等根則於聞聲嗅香等時顯示有補特伽羅因此並沒有無安立所依的過失答曰彼補特伽羅有法在眼等一一之前非有在眼等一切根之前非有故又彼補特伽羅有法在眼等一一之前非有設若見者即是聞者亦是受者如是可說一一根之前有補特伽羅但非有如是事故若謂見者聞者受者是有自性的異那麼有見者時聞者亦應當有如是則一個補特伽羅應成多數我子三破一切所取之先有取者之能立問曰彼我雖在一切根等之前而有但沒有無安立所依的過失何以故有眼等根的因四大種故答曰彼我有法在能生眼等根及受等心所的四大種上亦非由自性有何以故與前說前後有和同時有的過失相同故癸二破所取有自性問曰雖破取者但所取是有自性答曰彼眼等根與受等心所亦無自性因為眼耳等根與受等心所是誰所屬的我亦無自性故癸三斷諍我有法執汝我有自性之分別應當息滅因在眼等根之前後及同時皆無自性故又執為完全沒有之分別亦應息滅彼我能顯示所取有故觀火薪品第十辛二破補特伽羅有自性之能立因分二一破能立之喻二破能立之因壬一破能立之喻分三一破火薪有自性二由此正理類知餘法三為破彼執呵責其見癸一破火薪有自性分三一用前未說之理而破二用前已說之理而破三總結子一用前未說之理而破分二一破自性一二破自性異丑一破自性一問曰取者與所取互相觀待而有故無自性之語不應道理如火與薪雖是互相觀待而有但有自性答曰彼所取與取者若有自性是自性一耶抑自性異耶若如第一是自性一則作者與所作應成一彼薪與火是自性一故丑二破自性異分二一破所立宗二破能立因寅一破所立宗分二一應不觀待二應不會合卯一應不觀待若如第二是自性異則火有法無薪亦應生起並且恆常燃燒和不從能燃的因生起又於工作當成無有意義如是則薪亦非有及應不觀待餘薪因為與薪是自性異故若許不待餘薪是故火應不從能燃的因薪而生若許火不從能燃的因薪而生則火應恆常燃燒因為不從能燃的因生故若許火常燃則加薪的工作當成唐勞無功若謂在正燒時是薪沒有無薪生火的過失則火應非有自性地能燃彼薪何以故在正燃時方是薪故卯二應不會合火有法應不至薪與薪自性異故若不至薪應不成為燃薪若不燃薪應不止息若許不息應自然燃燒與恆常燃燒彼燃不止息故問曰離薪雖別有火但火與薪會合如女可會見男男亦會見女答曰火薪既自性異又能會合極不應理因為火薪等若成互相遮遣火不是薪薪不是火則離薪別有火固可許火與薪能會合但是火薪非如是而有故寅二破能立之因問曰火薪有自性是彼此觀待故答曰若觀待薪而立火觀待火而立薪但是火薪觀待誰先成立設若先成立薪然後待彼立火則火有成已復成之過並且所燒的薪上應成無火的過失因為薪有自性地先成火待彼而成故問曰火薪同時成立所以無過答曰火薪二者既是互相觀待而成即無自性因為觀待薪而成立火亦觀待火而成立薪故又若待薪有火彼火已成耶抑未成耶若是未成則觀待薪而成立之火有法應不成觀待薪火未成故設若已成彼火有法有自性地觀待薪不合道理已成故復次火薪皆無自性因為觀待薪的火無自性亦沒有不觀待薪的火觀待火的薪無自性亦沒有不觀待火的薪故問曰火薪有自性何以故現見由火燒薪故答曰火不從無薪處來不見從無薪處來故薪中亦非有火因薪中不見有火故子二用前已說之理而破如是其餘說明火薪無自性的理在成立已去未去和去時中去的作用無自性的理中已說不過把且已去不去等句換為且已燒不燒等語而破除之子三總結薪不是火因為作者與所作非一故但離薪亦無火無薪火不生故火與薪非有自性地互相具有火與薪亦非有自性地相依因為火薪非是有自性的一和異故癸二由此正理類知餘法由我與取一切次第有法亦可說明瓶等諸法皆無自性何以故與成立火薪無自性理相同故癸二為破彼執呵責其見諸實事師有法龍樹不認為汝等善巧佛陀教義因為說我及諸法是有自性的一和有自性的異故觀前際後際品第十一壬二破補特伽羅有自性之因分二一破有生死作用的因二破有苦的因癸一破有生死作用的因分二一破流轉有自性二由此正理類知餘法子一破流轉有自性分二一破流轉初中後三分二破生死前後同時分丑一破流轉初中後三分問曰我有自性因為有流轉故答曰彼流轉有法前後皆無自性因為始與終無自性故如能圓滿等問佛曰世尊流轉有前際否佛答非有故若爾則應有中曰彼流轉中有法中際應無自性流轉中始與終皆無自性故丑二破生死前後同時分分三一總示二廣釋三略結寅一總示彼流轉中有法生死前後與同時的次第無有自性因為初中後三無自性故寅二廣釋分二一破前後二破同時卯一破前後若謂生在先老死在後則生之先應無老死及前世未死亦應於此世中生設若後有生先有老死則老死有法應成無因先無有生故若許老死無因無因云何成應不成由生為緣而有故卯二破同時生與老死等不應有自性地同時否則正生時應當為死並且生死二者應成無因故寅三略結若於彼生與老死有法戲論執為有自性者不合道理因為生死中前後同時的次第皆無自性故子二由此正理類知餘法不僅流轉無有前際即因果相相依受與受者諸有義等一切有為法亦無前際故觀自作他作品第十二癸二破有苦之因分二一正破苦有自性二由此正理類知餘法子一正破苦有自性分二一立宗二示因丑一立宗問曰我有自性因為有與我相聯繫的苦故答曰有許苦是由自作有許由他作有許由自他共作有許從無因生等說皆不應理丑二示因分二一破自他各別作二破自他共作和無因作寅一破自他各別作若謂彼苦是由自作則苦有法應非從因緣生彼是自作故而實不爾因為依死時的蘊等而有生時之蘊等故又所知有法彼苦非有自性地由他作因為在此死時之蘊以外若另有生蘊說為他者及在彼生蘊以外另有死蘊說為他者固可說由彼死蘊的他作彼生蘊及說苦由他作但是彼二非是有自性的他故若謂補特伽羅自作苦非苦自作故無過失那末自作苦的補特伽羅有法即非有自性地作苦彼補特伽羅即是苦故苦謂從人補特伽羅的他而生天的苦則人非有自性地授豫天苦人補特伽羅的他作苦授豫天彼天亦是苦故又從人補特伽羅的他而生天的苦則由人作苦已授與天補特伽羅的他但是人補特伽羅的他仍是苦故苦有法非他作自作不成故此理決定何以故他所作的苦從他補特伽羅來說即成自己所作故又苦非自作因為苦自己不作苦故苦有法非是有自性的他所作因為他亦非他自己所作故寅二破自他共作和無因作苦有法非自他二者共作因為若自他各各能作方有共作但是自作他作皆非有故又苦有法非無因作是暫有之生故子二由此正理類知餘法不但有情的苦非四種生即外界一切法有法亦非有自他各各生共生和無因生等四種何以故從彼等生由以上的理已破故觀行品第十三己二示有為法自性空分二一正示二破能立因庚一正示分三一以他宗共許之教成立二斷諍三破對經義之異釋辛一以他宗共許之教成立彼等諸行有法是妄世尊說何法虛誑彼即是妄行是虛誑法故辛二斷諍問若諸行是妄則一切有為法皆無作用即成損減答曰佛說何法虛誑彼即是妄非由損減說為虛妄未說一切有為法完全無故問曰既未說一切法完全無有是說什麼呢答曰世尊說諸行皆妄有法非說諸有為法沒有是說諸法自性空故辛三破對經義之異釋分二一破誤解經義二破彼誤解經義之能立因壬一破誤解經義有聲聞部云經義是說有為法無有常住的體性因為現見有變異故又有為法非是無性法何以故須許有為法有空性故若無自性即無變異壬二破彼誤解經義之能立因分二一破變異為有自性之能立二破空性為有自性之能立癸一破變異為有自性之能立因有為法有法應無變異有自性故前自分位時應無變異因為少年非有自性地老故他分位時亦非有自性地老何以故老亦無須再作老故若謂即彼少年變為老則乳應成酪若謂含乳分位變為酪此亦非理因為離乳外非有別法變為酪故癸二破空性為有自性之能立空無自性因為若有少許不空法則空應有少許自性但是非有少許不空法故問曰世尊為解脫所化衆生故說空而汝指中觀師今謗空故與汝辨論且止答曰有執空性是有自性故說彼等無法教化諸佛說由空見即能遠離一切實執故觀和合品第十四庚二破有為有自性之能立因分三一破和合有自性二破因緣生起有自性三破繫縛解脫有自性辛一破和合有自性分二一正破二示由此理亦遮合時有自性壬一正破分二一立宗二立因癸一立宗若謂蘊處界由自性有因為有同時和合故答曰見眼根所見色境見者眼識三法彼等二二合根與境或識與境或一切根境識三互相和合皆非由自性有如是貪所貪貪者及其餘煩惱以至其餘處等三法和合亦無自性癸二立因分二一由異無自性破和合有自性二觀察一異已破和合有自性子一由異無自性破和合有自性見眼根所見色境和見者眼識等有法非有自性地和合因為若是有自性地和合則彼此觀待為異的異法亦應有自性但是異無自性故和合亦無自性不但見眼根所見色境和見者眼識等異法無有自性其餘瓶衣等有法和合亦無有自性因為異法無自性故依彼而有此則此不是有自性地異於彼所依如瓶是因衣而異若無衣則瓶不成為異於衣故瓶衣非有自性地異若瓶是有自性地異於衣則於無衣時瓶亦應因衣而為異但是若無衣則瓶不因衣為異故又若謂由有泛說異的總名而名為異故無過失答曰異的總名在異的別名中無有因為彼別名中無須安立總名故不異一中亦非有彼異的總相何以故不異中只有一故此因應許又異與一非有自性異的總名非有故子二觀察一異已破和合有自性和合無自性何以故自法不與自法合異法與異法亦非有自性地和合故壬二由彼理亦遮合時有自性若謂有和合因為有合時故答曰合正合時合者皆非由自性有因為和合的事無自性故觀自性品第十五辛二破因緣生起有自性分二一破有為法有自性二示許有自性者不離邊執壬一破有為法有自性分二一破能立二示違教理癸一破能立分三一正破能立的理二示由此理遮其餘三邊三破執呵見子一正破能立的理問曰有為法有自性因為是從因緣生起故答曰有為法有法應不從因緣生有自性故問曰自性是從因緣生答曰自性有法應成有所作從因緣生故而實不爾何以故自性無所作故問曰自性若無所作如何是有自性答曰瓶實有空有法是自性因為是非所作及不如長短等觀待他而有的法性故子二示由此理遮其餘三邊問曰雖破自體但他體是有自性答曰他體無有自性觀察時彼非有自性故此理決定他體之自性即說為他體故問曰雖破自體他體但諸法是有自性答曰諸法若有自性須許有自體他體因為離自體他體即無有諸法故問曰雖破有體但無體法是有答曰因為有體法無有自性無體法亦無自性何以故如世間人說有體法變異壞滅名為無體故子三破執呵見凡執自體他體有體和無體有自性者彼即不能見佛法真實義因為諸法是無自性故癸二示違教理分二一違教二違理子一違教有為法無自性因為世尊如實了知有體無體曾在聖者迦旃延那教授經中破有無二邊故子二違理有為法有法應當永不變異有自性故此理決定何以故自性而有變異之法畢竟非有故問曰有為法有法應不變異非有自性故答曰有為法有法應非有變異有自性故壬二示許有自性不離邊執智者不應住有無二邊因為若許諸法有自性則為常見若許有為法無則為斷見故由許諸法是自性有則不成無即為常故若許先由自性有而今無者當成斷見故觀縛解品第十六辛三破縛解有自性分二一正破二破其能立之因壬一正破分三一破流轉涅槃有自性二破縛解有自性三斷造作唐勞無益過癸一破流轉涅槃分二一破流轉有自性二破涅槃有自性子一破流轉有自性問曰諸法有自性因為流轉有自性故答曰若爾蘊與有情是誰流轉耶若謂是行蘊流轉彼亦應為常與無常隨一而定彼等若是常法則不流轉離去來的作用故若是無常即非有自性流轉因為剎那與相續皆非有自性地流轉故若謂是有情流轉則有情亦與行蘊相同無論常與無常皆無自性流轉故正量部問云是常無常皆非的補特伽羅流轉答曰彼補特伽羅有法應非有自性地流轉在蘊處界中以五種推求不可得故蘊處界即我異我彼中有此此中有彼彼此相應如從人的取蘊流轉至天的取蘊時是捨人的取蘊而流轉耶抑不捨而流轉耶若捨取蘊而流轉則前後二者之中間應無有蘊因為前蘊已捨後蘊尚未取故若許前後二者之間無中有蘊則彼補特伽羅應無流轉既無有有中有則取亦無故若不捨取蘊流轉則一補特伽羅應成人和天兩種身因為人的蘊未捨即流轉為天的蘊故子二破涅槃有自性問曰有流轉因為有涅槃故答曰涅槃無自性諸行寂滅是無自性有情寂滅亦無自性故癸二破縛解有自性分二一總破二別破子一總破問曰諸法有自性因為繫縛與解脫有自性故答曰具足生滅法的諸行非有自性地繫縛及解脫因為剎那與相續皆非有自性地繫縛和解脫故如先所說有情亦非有自性地繫縛和解脫因為剎那與相續皆非自性地繫縛和解脫故子二別破分二一破繫縛有自性二破解脫有自性丑一破繫縛有自性問曰繫縛有自性因為貪等繫縛所取有自性故答曰在任何分位繫縛皆無自性因為有所取和無所取皆不繫縛故若在所繫之先有能繫縛固可繫縛然彼非有故其餘破法同觀去來品中所說已去未去和去時等可以換為已縛無有縛等而破丑二破解脫有自性問曰有繫縛因為解脫有自性故答曰此執非理何以故由於已繫縛則非有自性地解脫未繫縛則解脫亦無諦實故若謂繫縛正在解脫時是有自性則繫縛與解脫有同時的過失癸三斷所作唐勞無益過問曰設若解脫無有自性則為求解脫而修善行應成唐勞無益答曰不成若執涅槃實有謂我不受後有當證涅槃涅槃為我所有誰起如是執彼即於所取起莎迦耶見大謬執故因此於彼流轉與涅槃不應分別為勝義中有因為諸法實相中無涅槃可生而流轉還滅亦非勝義中有故觀業品第十七壬二破縛解有自性之能立因分二一牒諍二答難癸一牒諍問曰流轉有自性因為是業果的所依故何謂業果此中分二一建立善不善二離斷常之理子一建立善不善自善防護律儀饒益於他和慈心等任隨一種有法皆是善法是感現世和後世悅意樂果的種子故大仙佛說諸業是思業和思已業彼業差別共有多種許彼思業即是意業彼思已業許為身語業善不善語及身行動如是名為未遠離無表和遠離無表亦許為業如是從受用所生的福非福業及思業彼七法即許為業子二離斷常之理分二一疑問二答難丑一疑問問曰彼業直至異熟生時若仍然安住者則當成常設若生已無間即滅即成滅法云何生果因為滅法是無體故丑二答難分二一由許相續離斷常二由許不失法離斷常寅一由許相續離斷常芽等相續從種子生由彼相續生果若無種子則彼相續不能生因為從種子生相續從相續生果種子在果之先而有是故非斷非常凡是心相續皆從初心生起從彼相續而生果此初心若無則彼相續不生因為從初心生相續從相續生果而業在果之先而有是故非斷非常如此十白業道是成辦法善法的方便此善法果即是受用現世和他世五妙欲故寅二由許不失法離斷常分二一破他宗所答二自答卯一破他宗所答許相續義極不合理何以故若以種芽相續之同法作為離斷常之理則過失大而且多如從青稞種子生青稞芽及從彼僅生青稞一樣的果則有善心不善心和無記心亦應唯生同類及天應唯生天等過失故卯二自答分三一略示二廣釋三總結辰一略示諸佛獨覺聲聞等所說的道理極為甚善今當略說作業時即生不失法如借債券業如債務彼不失法有三界無漏等四種差別彼亦是無記性非善性因為在斷善根的相續身中亦有故亦非不善性者在離欲者身中亦有故辰二廣釋彼不失法非見所斷是修所斷由於業雖壞滅不失法不壞滅故由不失法生起業果問曰由於業斷對治斷則不失法亦斷由於業滅度果滅則不失法亦滅又有何過答曰如此則有業壞滅所作亦失壞的過失在結生時同界之業一切同分非同分的不失法唯生一種餘諸異法盡皆壞滅而現在法現世中有漏無漏二種業與業的不失等異法皆可生起又果雖成熟而不失法仍然安住彼不失法在預流向等度果即滅及死時滅又不失法有有漏無漏二種差別辰三總結業非常何以故生已無間即壞滅空故業非斷因為由不失法的能力流轉生死故業等不失法是佛所說唯應承認癸二示答分三一業無自性故離斷常二破業有自性三引喻示業雖無自性而有作用子一業無自性故離斷常若許業有自性則不能離斷常何以故若業初生乃至成熟時猶安住者即成為常不住則成斷故業有法非有自性住的常及非有自性滅的斷因為生無自性故何以故彼業無自性故業有法不失壞因為生無自性故子二破業有自性分二一示能破二破彼之能立丑一示能破分二一若常則有非所作過二有異熟無窮過寅一若常則有非所作過業有法應是常因為有自性故若許是常則成非所作何以故常則無所作故若謂業非所作則當成不作業而感果的過又彼宗雖修梵行亦應成不住梵行的過因為有不作的業故又與世間所說諸作瓶等一切名言相違因為有不作之業故又應成無作福作罪的差別因為有不作之業故寅二有異熟無窮過彼業異熟果雖已成熟應再重生異熟果因為業有自性故何以故若業有自性則應常住故丑二破業有自性問曰業有自性因為業的因煩惱有自性故答曰諸煩惱有法非實有因為它是從非理作意而生故業非實有因為煩惱非實有故何以故此業是從煩惱生故問曰業及煩惱有自性因為有彼業的果身故答曰說身有自性不合道理因為業與煩惱自性空故何以故經說業與煩惱等是身的緣故問曰業有自性因為有受業果者故由無明所蔽及具足愛纏的衆生即是受果者而受者與作業者非異亦非一故答曰作業者亦無自性因為此業非有自性地從緣生亦不從非緣生故業所生果無有自性因為業與作業者皆無自性故受者亦無自性因為所受之果無自性故子三引喻示業雖無自性而有作用問曰業果若無自性則不應有作用答曰無過如佛由圓滿神通力變化一個化人復由化人又化作一個化人如是作業者猶如第一化人而彼作業者所作的事即如第一化人所變現之化人是故煩惱業身作者和果皆如尋香城如陽焰如夢故觀我法品第十八己三趣入真性之軌則分五一正示二斷違教之諍三導入真性之次第四真性之體相五示於真性定須修習庚一正示分二一抉擇見二由修無我滅除過患之次第辛一抉擇見問曰業及煩惱若不是真性那末什麼是真性趣入真性之方法又是怎樣呢答曰內外諸法畢竟遠離我及我所執即是真性趣入真性的軌則者謂若執我有自性那末我與蘊是有自性的一體耶或是有自性的異體耶設若蘊與我是有自性的一體那麼我即成有自性的生滅法設若我與蘊等是有自性的異體那麼我有法蘊應無有為的相我是有為蘊即應無生住滅相汝許我與蘊是有自性的體異故我所應無有自性因為我無自性故辛二由修無我滅除過患之次第分二一滅除過患之次第二得解脫的軌則壬一滅除過患之次第修我及我所無自性的瑜伽行者有法應無我執及我所執因為彼現證我我所相本來寂滅的真如故問曰我蘊應有自性因為有斷我及我所執的瑜伽行者故答曰誰見計修無我執和無我所執的瑜伽行者有自性誰就不能見真性因為彼無我和無我所執的瑜伽行者亦不是有自性故若能滅盡對內外諸法執為我及我所的莎迦耶見則取亦滅取若滅則由業為緣所引的生亦滅何以故莎迦耶見是流轉生死的根本故壬二得解脫的軌則業及煩惱滅盡即得解脫因為業和煩惱若能滅盡則生老死亦息滅故若爾業和煩惱由何而息滅耶答曰由修空性即能滅除業惑因為業和煩惱是由非理作意的分別心而生的彼等分別復由實執戲論而起所以須修空性才能滅除實執戲論故庚二斷違教之諍問曰設若滅盡莎迦耶見即是真性那麼與經說我自為依怙更有誰為依由善調伏我智者生善趣的話豈不相違嗎答曰不相違由於諸佛為令毀謗業果者離不善故假說有我又為深信業果者趣入解脫故亦說無有主宰的我諸佛又為殊勝所化上根利智說我與無我皆無自性故問曰設若佛說我與無我俱無自性然有何法可說答曰在勝義諦中本無可說因為在勝義中息滅心的行境故在勝義中不生不滅的法性與涅槃相同故庚三導入真性之次第問曰真性在勝義中雖不可言說但在言說中請示導入真性的次第答曰可爾佛先為許剎那不變異的衆生說一切有情和器世間實有次為許剎那變的衆生說非實有而是變異的次又說觀待異生是實有觀待聖者非實有再次說非實而變異的亦無自性真實而不變異的亦無有自性因此佛是隨順衆生的心量而說法故庚四真性之體相問曰若爾什麼是真性的體相呢答曰瓶諦實空有法是有真性之相的具相者非從別人言說而能現量了知自性寂滅非由語言戲論所能言說現證彼真性時離諸分別和是無異體的法性故又因相續不斷亦不常因為依何因生起之果即與彼因非一亦非與彼因有自性地異故庚五示於真性定須修習對於彼非有自性的一異不斷和不常的真性有法應須勵力修習因為諸佛世間依怙的教法是滅除老死的甘露故又修彼非有自性的一異不斷和不常的真性有法此世雖未得涅槃然仍須勵力修習因為由修習真性之力此世雖未證得涅槃但在佛未出世聲聞已盡之時獨覺的智慧能够不依師教而能生起故觀時品第十九己四示時自性空分二一正示時自性空二破彼能立之因庚一正示分二一總破時有自性二別破自他部所許辛一總破時有自性問曰諸有為法應有自性是安立三時的所依故答曰現在未來若有自性不外乎二種而有一觀待過去即現在與未來應在過去時有因為現在未來有自性地觀待過去故但是現在與未來不應有自性地觀待過去因為在過去時中無有現在和未來故若是觀待須同時有故二不觀待過去現在與未來亦無自性因為不觀待過去則無現在和未來二時故由此正理次第之軌則亦當了知類破其餘二時即用過去與未來若觀待現在等句破之由觀察三時次第之理當知對於上中下等和一二三等亦爾辛二別破自他部所許別部有人問曰時有自性因為具足有剎那須臾等分齊故答曰時不能以剎那等分齊量可取因為時非恆常安住不變故以剎那分齊量所取的時非有因為彼不可得見故如此之時不能以剎那等量施設因為量不能取故內部諸實事師問曰時雖不是常法但依有為法的時是有自性的答曰諸有為法既無自性時云何有自性呢因為時是依有為法而安立的沒有與有為法異體的時故觀和合品第二十庚二破時有自性的能立分二一破時是果的俱有緣二破時是果的生滅因辛一破時是果的俱有緣分三一破果從因緣和合生二破果唯從因生三破果從因緣和合再生壬一破果從因緣和合生分三一破果在和合之後而生二破果與和合同時生三破果在和合之先而生癸一破果在和合之後而生問曰時是有自性因為它是果的俱有緣故答曰果若從因緣和合而生則和合中即已有果那末果有法應不是從因緣和合中生因為因緣和合中已有果故又若因緣和合中無果則果有法應不是從因緣和合有自性地生因為是從因緣等和合而生因緣和合中無果故若和合中有果果有法在因緣和合中應無因為若因緣和合中有果那麼和合中應有所見但和合中都不可見故又若果是從因緣等和合而生則和合中無果那麼果有法因緣等亦應與非因緣相同因為因緣中是有自性地無果故若謂由和合而生親因由親因與果已其因即滅那麼與因及滅因應成二體設若因未與果即滅那麼果芽等有法當成無因因為在自己的親因滅了以後才生起故癸二破果與和合同時生設若果與因緣和合同時生則能生與所生應成同時癸三破果在和合之先而生毗婆沙師有云果在和合之先而生答曰果有法應成無因生因為果在沒有自己的因緣之先而生故壬二破果唯從因生分二一破因果體一二破因果體異癸一破因果體一問曰果唯從因生不從因緣和合生即無於果與因和不與因的過失由於因滅已即住果體故答曰若因滅生果一因應至一切果又先生的因應當再生癸二破因果體異分二一破因生果的作用有自性二破因有自性子一破因生果的作用有自性若因是有自性地生果那麼因是在果之先滅已而生耶還是未滅而生耶又果是生已而生呢還是未生而生耶若如第一則因滅已不能生果由於因壞滅已其因即無故又既已生那就不須再生故若如第二則與果相屬之因現在安住未滅亦不能有自性地生果因為因未變壞則不能生果故又設若在因位時與果不相屬而生則彼因有自性地生果即不合理因為在因位時尚無果故又因不是有自性地生果因為因見不見果皆不是有自性地生故又因應非有自性地生果因為因果不相合故過去果不與過去因未來因和現在因同時相合現在果不與未來因過去因和現在因同時相合未來果不與現在因未來因和過去因同時相合故如是觀察因果二者既不是有自性地相合那麼因就不能有自性地生果問曰因果是有自性地相合答曰因果若是有自性地相合因就不能生果若謂果空無果的因能生果不應道理由於離果故若謂由果不空的因是有自性地生果亦不應理因為有果不須再生故又果有法應成不生不滅因為自性不空故此理決定如是由於彼自性不空即成不生不滅故又果有法應非有自性地生滅因為自性空故此理決定如是因為彼果若有自性當成不生不滅故又若謂因果體一畢竟非理因為若因果體一則能生與所生即成為一故因果體異終不應理因為若因果是有自性的體異則因與非因應相同故又因應不能生果因為果有自性故若謂因果有自性之因不能成立那麼因應不是有自性地生果因為果無自性故子二破因有自性因應不是有自性因為能生無自性故屬於任何因之果皆無自性何以故因無自性故壬三破果從因緣和合再生彼諸因緣等和合有法不應是有自性地生果何以故自己不生自己故若許不是有自性地生果那麼因緣和合應不是有自性地生果因為自己不生自己故問曰由因緣和合所生的果雖無自性但有不由因緣和合而生的果答曰不從因緣和合而生的果應當沒有何以故因緣和合所生的果無自性故問曰果雖無有自性但因緣和合是有自性答曰因緣和合應無自性由於果無自性故觀成壞品第二十一辛二破時是果成壞的因分二一破生滅有自性二示若許生滅有自性應有斷常的過失壬一破生滅有自性分二一破所立二破能立癸一破所立分三一觀察是否俱有已而破二觀察依何有已而破三觀察是否一異已而破子一觀察是否俱有已而破問曰時有自性因為果是成壞的因故答曰離成或共成皆無有自性地壞離壞或共壞皆無有自性地成為下面所說之理所破故破法如何謂離成云何有壞呢實則離成應無壞因為離生即無死故共成應無有自性地壞死生不能在一時中有自性地共有故離壞應無有成因為諸有為法無論何時皆不離無常故共壞亦無有自性地成因為生死不能在一時中有自性地共有故又成壞等有法應無自性汝等成壞彼此非有自性地相共亦非有自性地不共故子二觀察依何有已而破盡中非有自性地成因為盡與生二者不能一時有故不盡中亦不是有自性地成何以故若不盡是有自性則離有為法的相故盡中非有自性的壞因為彼中不依有自性的壞故不盡中亦不是有自性地壞何以故若不盡有自性則應離壞故問曰成壞是有自性因為有為法是有自性故答曰有為法與成壞皆無自性因為沒有有為法即沒有成壞沒有成壞即沒有有為法故由於成壞若有自性那麼彼是空耶抑不空耶若空即不能言成壞有自性若自性不空即無有成壞等法故子三觀察是否一異已而破成壞若有自性那麼成壞應非體一成壞亦不是有自性的體異故癸二破能立分二一示現見非能立二示彼能立子一示現見非能立汝若作是思維成壞有自性因為現見有成壞故此不一定何以故由癡暗所覆乃見成壞有自性故子二示彼能立分二一破成壞從同不同類生二破有為法從自他生丑一破成壞從同不同類生問曰由癡暗所覆見成壞實有之說依何成立答曰依理成立成壞應無有自性因為有體法不從有體法生有體法不從無體法生無體法不從無體法生和無體法不從有體法生故丑二破有為法從自他生有為法有法應非有自性地生因為不從自生不從他生和不從自他共生故壬二示若許生滅有自性應有斷常的過失若許有為法有自性應成斷常見何以故若見自性有的有為法是常則成常見若見自性有的有為法是無常則成斷見故問曰雖然許有為法有自性但不墮斷常二邊因為因果的生滅相續是有故答曰若有彼因果的生滅相續那麼因相續應當成斷滅由於因已壞滅就不再生故又有體法有法後來成為無體法不應道理有自性故又證無餘涅槃時應成斷因為證無餘涅槃時有蘊相續已寂滅故又三有相續無自性何以故後有即死有滅時非初有即生有生故後有不滅時亦不是初有生故問曰後有正滅時即是初有有自性地生時答曰那末一個有情應有二個不同的有同時共有因為正在滅時的人的死有為一個而正生時的滅的生有另成一個由於若是有自性的生則因果同時故又住於何蘊死時不應即於彼蘊有自性地生因為正滅與正生不應同時共有故又三有相續無自性因為三時中三有相續有自性不應道理故三時中既無有自性的三有相續則三有相續有自性即不應道理故觀如來品第二十二巳五示三有相續自性空分二一破如來有自性二破煩惱有自性庚一破如來有自性分四一正示二示如來非生邪分別之處三示執邪分別的過失四由此理類知餘法辛一示如來非生邪分別之處分三一破取者有自性二破所取有自性三總結壬一破取者有自性分二一破如來有實體二破依蘊有自性癸一破如來有實體問曰三有相續有自性因為如來有自性故答曰如來有法無自性與蘊非一與蘊非有自性地異蘊非有自性地依如來如來非有自性地依於蘊如來非有自性地具有蘊故癸二破依蘊有自性分二一正破二破取者和所取有自性子一正破正量部云佛是依蘊安立的不可說與蘊體一和體異答曰如來有法應非從自性有何以故是依蘊假安立名故若許如來非從自性有則彼如來有法應非從他生因為不從自體生故問曰如來雖不是從自體生但依他法是有答曰如來有法應無自體是依他而假安立故若許如來無自體則如來應非實有何以故彼無自體故又如來有法應非離蘊有他體因為無有自體故如來有法無自性因為離自體和他體不可得故子二破取者和所取有自性問曰如來和蘊是取者和所取皆有自性答曰彼等應無自性因為若不依蘊而有如來固可說為有自性但彼仍須依蘊則依蘊後即成蘊的取者由於不依蘊即無如來故又如來有法不是有自性地取於五蘊何以故不依蘊即無如來故又如來有法應非彼蘊的取者蘊非所取故又如來無自性因為取無自性故如來有法不應立為有自性的取者何以故若以五種尋求之時與蘊非一非異故壬二破所取有自性彼所取蘊有法非從自性有是緣起有故彼所取蘊有法在勝義中非從他體而生因為不是從自體生故壬三總結蘊空故則如來空不應在勝義中安立為有因為所取和取者在勝義諦中空故辛二示如來非生邪分別之處問曰若說如來無有自性豈不成損滅執嗎答曰不成何以故如來言說中有我不說為空無亦不說在勝義中不空不說亦有亦無和非有非無是說由名言假安立故又如來有法在勝義中應無有常無常亦常亦無常和非常非無常何以故自性寂滅故如來有法應非有邊無邊亦有邊亦無邊和非有邊非無邊何以故自性寂滅故又彼諸實事師有法以實執深厚說如來滅度後有或由虛妄分別說如來滅度後無佛有法滅度後不應思維有或無何以故自性空故辛三示執邪分別的過失一切實事師有法不能見如來法性因為如來離諸戲論而非有自性地盡彼等但由戲論所復損害慧眼故辛四由此理類知餘法如如來無自性一樣衆生亦無自性如來的體性空性即是衆生的體性故觀顛倒品第二十三庚二破煩惱有自性分二一正破二破救辛一正破分五一以緣起因破二以所依無自性的因破三以因無自性的因破四以所緣無自性的因破五以其餘的因無自性的因破壬一以緣起因破問曰三有相續是有自性作為彼因之煩惱是有自性故答曰煩惱非實有經說貪瞋癡是從分別心生由依淨不淨顛倒分別而生故其理決定如是何以故煩惱既依淨不淨顛倒分別所生那麼彼等就不是有自性地生故壬二以所依無自性的因破諸煩惱有與無皆無自性因為彼所依的我有與無皆無自性故其理決定如是何以故由於彼等煩惱的所依本無自性所依既然全無自性則能依的煩惱亦無自性故問曰煩惱所依的我雖無自性但是心是有自性答曰此不應理如觀察於自身起的薩迦耶見彼見所執之我本來無有在有煩惱的心上以五種觀察求諸煩惱亦不可得又於自身起的薩迦耶見彼見所執的我本來沒有一樣在煩惱上以五種尋求有煩惱的心亦不可得故壬三以因無自性的因破依淨不淨顛倒所起的煩惱在勝義中非有由於淨不淨顛倒皆無自性故壬四以所緣無自性的因破問曰煩惱有自性因為煩惱的所緣有自性故答曰色聲香味觸法六種有法是貪瞋癡的所依由於增益為淨不淨顛倒而生三毒故色聲香味觸法有法唯是假安立何以故如尋香城陽焰和夢故壬五以其餘的因無自性的因破分二一破貪瞋的因有自性二破癡的因有自性癸一破貪瞋的因有自性於彼等境色聲香味觸法有法淨不淨在勝義中非有何以故猶如幻化人和影像故勝義中非有淨因為觀待不淨安立為淨的那個不淨若不觀待淨則非有不淨故勝義中非有不淨因為觀待彼淨安立為不淨的那個淨若不觀待不淨則非有淨故是故勝義中云何有貪和瞋呢勝義中無有淨與不淨故癸二破癡的因有自性分三一破顛倒有自性二破有顛倒者有自性三觀察有無顛倒境已而破壬一破顛倒有自性若於無常計常謂倒執則蘊有法執為是常在勝義中應不是顛倒因為勝義中沒有無常故何以故勝義中空沒有無常故又若於無常計常謂是倒執則蘊有法是無常執為在勝義中有即是顛倒何以故勝義中空沒有無常故問曰勝義中雖無常執但執在勝義中是有答曰執在勝義中非有因為能執執的業用執者和所執皆寂滅勝義中無故壬二破有顛倒者有自性問曰顛倒在勝義中是有因為有顛倒的天授某甲有故答曰何補特伽羅有顛倒及何補特伽羅無顛倒在勝義中皆非有因為在勝義中沒有執為顛倒或執為正確故又何補特伽羅有顛倒若觀察其自性則不可得因為已成顛倒未成顛倒和正顛倒時在勝義中尋求顛倒皆不可得故又顛倒等有法在勝義中應非有因為勝義中無生故在勝義中應沒有有顛倒者因為在勝義中不生諸顛倒故又在勝義中應無有顛倒者有為法不從自生他生和自他共生故壬三觀察有無顛倒境已而破常樂我淨應不是顛倒因為有常樂我淨故若謂有常樂我淨的因不能成立那麼無常苦無我不淨在勝義中應無有因為無有常樂我淨故觀察勝義中有無顛倒是有大義利的由於如是觀察之後生起修習則能息滅顛倒顛倒滅已無明即滅無明若滅行等自息滅故辛二破救問曰煩惱是有自性有它的對治故答曰諸煩惱有法應不能斷滅因為有自性故其理決定如是何以故若是有自性誰也不能斷故又若諸煩惱是有自性地無即斷滅無那麼諸煩惱有法應無須斷因為有自性地無故其理決定如是何以故既是無有即無須斷故觀聖諦品第二十四丁二斷諍分二一觀聖諦二觀涅槃戊一觀聖諦分二一牒諍二答難己一牒諍問曰汝宗應無生無滅無四聖諦等法因為彼等一切法空故若許無生無滅和無四諦那麼應無知苦斷集修道和證滅因為沒有四聖諦故若無知苦斷集修道和證滅那麼應沒有四果因為沒有知苦等故若無有四果則無住果者向亦應無有因為沒有四果故若無有住果和住向者則應無有僧寶何以故無有住果向的八補特伽羅故又正法亦應無有因為無有諸聖諦故若許無有正法及僧寶那麼云何有佛呢因為沒有正法和僧寶故若許無有佛則汝應是破壞三寶因為汝說一切法空無自性故從而即破壞了有果是法非法和世間一切名言因為一切有為法自性空故己二答難分四一示未通達緣起之諍二示空即緣起義三他宗一切建立皆不應理四若見緣起真性即見四聖諦真性庚一示未通達緣起之諍分二一正示二示自宗能建立他宗不能建立的差別辛一正示分二一示如是興諍是未了達三法二示未通達二諦壬一示未了達三法答彼諍曰實事師有法若執為自性空是無有則於汝有違害由汝不了達說空性的所為空性的體性和空性的意義故說空性的所為即是破除實執空性的體性如說非從他知性寂滅自性本來寂淨空性的意義是一切法自性空壬二示未通達二諦分五一二諦的體性二若不知二諦即不能了知經義三佛說二諦的所為四倒執二諦的過患五二諦甚深難知故佛最初不說法的理由癸一示二諦的體性問曰誰未了達空性的所為等妄興諍論者又是誰答曰即諸不知二諦的差別者是為除彼等無知癡暗當說二諦差別諸佛說法有法正依二諦即依世俗諦和勝義諦故癸二若不知二諦即不能了知經義諸實事師有法不知佛教甚深真實義因為彼等不知二諦的差別故癸三佛說二諦的所為佛說二諦是有大義因為不依世俗諦即不能說勝義諦若不能通達勝義諦則不能證得涅槃故癸四倒執二諦的過患實事師有法諸劣慧者自受損害彼於空性生惡見故猶如不善捉蛇和不善持明咒一樣癸五二諦甚深難知故佛最初不說法之理由所知一切法都是所知此處是指勝義諦有法佛知此法甚深微妙諸淺智難得了知故佛密意暫不說法因為若倒執空性則有極大過患故辛二示自宗能建立他宗不能建立的差別汝實事師所有毀謗空性的過失於我中觀師則非有因為生滅不能安立等過失於說空性者非有故又中觀師有法一切建立皆應道理因為中觀師許有空性故實有宗有法一切建立皆不應理因為汝不許有空性故又汝實事師是將自己的過失推向我中觀師因為我許緣起汝反說我有過譬如乘馬者自忘所乘之馬又實事師有法汝應是見諸有為法無因無緣者因為若見一切有為法由自性有則見諸法無因無緣故又汝應是破壞因果作者作所作和生滅果因為見一切法有自性故庚二示空即緣起義所知有法無有一法不是空性因為無有一法不是緣起其理決定如是何以故凡是緣起所生之法即說彼緣起所生法是空性亦即依彼空性假立名言彼空性亦即是離邊中道故庚三他宗一切建立皆不應理分三一不能建立四諦及知苦等二不能建立三寶和作用等三不能建立世間和出世間的名言辛一不能建立四諦及知苦等實事師有法應沒有生滅因為汝許一切有為法不空故若許無有生滅則汝不能建立四聖諦其理決定如是何以故若不是緣起云何有苦呢但是經說無常是苦義非自性有故又破壞空性者則不能建立集諦因為苦若是有自性則不從集諦生故又應不能建立滅諦何以故苦有自性故其理決定如是何以故若有自性則應恆常安住不變如是則破壞滅諦又應不能建立修習因為道自性有故但是道有法汝應非自性有因為汝道是所應修故又許修道滅苦而得滅亦不應理何以故無有苦集和滅諦故又苦諦有法後來在聖者位時應不能知因為先在凡夫位時未知苦一事是有自性故其理決定如是何以故自性是常住不變故如是汝應不能建立斷集證滅修道和證四果因為先在凡夫位未斷集等是有自性故不能建立知苦亦是如此又四果有法後來應不能得因為先在凡夫位未得果是有自性故其理決定如是何以故由執有自性而有自性則不能變異故辛二不能建立三寶和作用等實事師應無住果向者因為無果故若許無住果者則應無僧寶何以故無有住果向的八補特伽羅亦應沒有正法因為沒有四聖諦故若許無有正法那麼佛亦應當沒有因為無有正法和僧寶故又汝應許佛不依菩提菩提亦不依佛因為汝許佛與菩提有自性故又諸異生有法汝為得菩提雖修菩提行應不能證得菩提何以故在非佛位是有自性故又法善業及非法不善業終不能作因為自性不空故其理決定如是何以故不空何須所作自性非所作故又無有法善業及非法不善業亦應有果生由法及非法為因而生果報之事於汝則應無因為汝許果由自性有故因此從法非法所生的果報應是自性空因為從法非法為因所生果報汝亦許是有故辛三不能建立世間和出世間的名言實事師有法應是破壞世間一切名言因為汝破壞緣起的空義故又作應成無作未作而成有作不作亦應成作者何以故破壞空義故又諸趣有法應成不滅常住不變而離一切分位因為是自性有故又未得不應得亦無盡苦際亦無有斷一切業煩惱因為無有空故庚四若見緣起真性即見四聖諦真性所知有法誰見緣起自性空彼即見苦集滅道四諦的真實性若許諸法實有者則一切建立皆不應理故觀涅槃品第二十五戊二觀涅槃分二一牒諍二答難己一牒諍問曰此諸有為法有法應是不生不滅何以故自性空故若許不生不滅那麼許斷煩惱滅苦而證涅槃則不應道理己二答難分四一示他宗不能建立涅槃二明自宗所許涅槃三破涅槃實有四斷諍庚一示他宗不能建立涅槃此諸有為法有法應是不生不滅何以故自性不空故若許有為法不生不滅那麼許斷煩惱滅苦而證涅槃則不應道理庚二明自宗所許涅槃自宗沒有不能建立涅槃的過失因為在勝義中彼無斷無得不斷不常不生和不滅以及遠離一切戲論者說明涅槃故庚三破涅槃實有分三一破涅槃有四邊二破證涅槃者有四邊三成立生死與涅槃義辛一破涅槃有四邊分四一破許有邊二破許無邊三破許亦有亦無邊四破許非有非無邊壬一破許有邊毗婆沙師說涅槃是有體何以故是滅除業及煩惱的相續故答曰涅槃不是有體若是有體則涅槃應當成為有老死的相因為沒有離開老死的有體法故又若涅槃是有體法那麼涅槃則當成為有為法何以故凡是有體法沒有不是有為法故又若涅槃是有體那麼涅槃云何不從因緣生呢因為凡是有體法都是從因緣生故壬二破許無邊經部師說涅槃是實有的無體答曰若涅槃是無體無體云何有自性呢彼涅槃既是無體那麼無體則不應有自性故又若涅槃是有自性的無體則涅槃應是依因緣生因為不從因緣生的無體法非有故問曰有體與無體若無自性那麼涅槃則應成完全沒有答曰不成因為從前世到現世和從現世到後世三有相續的有體法皆是依因緣而安立的或是以無明為因而有的若不依因緣及沒有無明為因的一切戲論寂滅的滅諦即說為涅槃故又涅槃有體與無體皆不應有自性何以故佛說斷除三有生滅名為涅槃故壬三破許亦有邊亦無邊有一種裸形外道說涅槃是亦有體亦無體由於若就無煩惱與無生來說即是無體若就涅槃自己來說即是有體答曰涅槃非是亦有體亦無體何以故若涅槃是亦有體亦無體則凡是有體無體應成解脫此不應理若涅槃是有自性的有體無體那麼涅槃應不是不依因緣生因為有體無體若有自性則必須依因緣生故又涅槃應非是有體無體因為涅槃是無為法而有體生與無體壞滅皆是有為法故又涅槃如何有有體與無體此二法相違故因為有體與無體二法在一法上不能同時共有故如暗與明不能共有壬四破許非有邊非無邊若說涅槃非有體非無體是自性有亦不合理何以故若有體無體是有自性固可說非有體非無體有自性但是有體與無體二法皆非自性有故又涅槃有法是非有體及非無體應無自性何以故若亦非有體與亦非無體是有自性那麼須有現證彼是亦非有體亦非無體的人但是無有如此現證的人故辛二破證涅槃者有四邊如來有法無有自性何以故如來涅槃後和現在住世皆不應說有無亦有亦無和非有非無是自性有故辛三成立生死與涅槃義生死與涅槃真妄無有少分差別涅槃與生死真妄亦無有少分差別因為涅槃的實際是自性空生死的實際亦是自性空故因為就生死與涅槃二者的自性空來說毫無差別故無記見有法有十四種一依涅槃際有四種謂於如來滅度後見彼為有無亦有亦無和非有非無二依後際有四種謂於我與世間見為有邊無邊亦有邊亦無邊和非有邊非無邊三依前際有四種謂於我與世間見為是常無常亦常亦無常和非常非無常四依身命有二種謂於身命見為是一體和是異體一切有為法有法有邊無邊亦有邊亦無邊非有邊非無邊一體異體是常是無常亦常亦無常非常非無常等皆無自性何以故自性空故庚四斷諍問曰涅槃若無自性那麼佛為令得涅槃故而說法當成唐勞無功答曰佛於任何處所對任何補特伽羅皆未曾說一法有自性因為佛陀息滅一切實執行相及諸戲論常住寂滅涅槃故觀十二有支品第二十六丙二由未通達緣起與通達緣起而有流轉與還滅之理分二一流轉緣起二還滅緣起丁一流轉緣起問曰中論說因緣所生法我說即是空的因緣是什麼答曰即十二有支能引後有的因有三支有情由無明所覆而有後有故身口意業起三種行隨彼諸行趣於六趣由行為緣令識流轉六趣故所引果有四支若識入胎即有名色若有名色即生六處依於六處而有觸生由觸為緣而生諸受故觸有法是有因的即依眼根色境和作意而生故如是依名作意色根境而有識生的根境識三和合以為觸後有的能生因有三支即由受為緣生愛謂為受生愛若有愛即有取而有四取生若有取即生取者的有故若無取即得解脫何以故不生起有故彼有亦是五蘊所攝所生果有二支從有即有生老死愁嘆苦憂擾亂等又皆由生而有故如是已說由無明為緣而生唯是苦之蘊丁二還滅緣起諸智聖者不新作能引業愚癡異生是作業者何以故行是生死的根本故又聖智者現見諸法實相故若斷無明即得解脫何以故無明若滅則諸行亦不生故聖者有法息滅無明是有因由的即由了知而修諸法實相故所知有法如是正滅唯彼苦之蘊因為無明等滅已則行等亦不起故觀見品第二十七丙三若通達緣起則惡見自息的理由分二一說明十六種惡見二通達緣起則不住惡見的理由丁一說明十六種惡見惡見有十六種謂我於過去世是有是無亦有亦無非有非無等四見我與世間是常是無常亦常亦無常非常非無常等四見此等是依前際所生的見我於未來世是有是無亦有亦無非有非無等四見我與世間是有邊無邊亦有邊亦無邊非有邊非無邊等四見此等是依後際而生的見故丁二通達緣起則不住惡見的理由分二一通達名言中緣起如影像則不住惡見二通達勝義中息滅一切戲論則不住惡見戊一通達名言中緣起如影像則不住惡見分三一破依前際後際所生的第一類四見二破依前際所生的第二類四見三破依後際所生的第二類四見己一破依前際後際所生的第一類四見即我於過去世是有無亦有亦無非有非無此四是依前際所生的見我於未來世有無亦有亦無非有非無此四是依後際所生的見若我在過去世是自性有不應道理因為過去世的彼我非即現在世的此我故若謂前世的彼我即今世的此我則不應理何以故前後世的五蘊各別故此理決定如是因為離開取蘊即沒有汝的我故問曰若離開取蘊沒有我那麼取蘊就是我答曰如此則汝的我應是沒有自體僅是蘊的異名故又取蘊有法不是補特伽羅的我何以故是生滅法故又所取應不是取者因為能與所非一故又我有法非是離開所取蘊外另有異體何以故若我離所取蘊外另有異體那麼無有所取時亦應有我但是離所取則沒有我故又我有法非是離開所取蘊另有異體否則離開所取應見有我但我不可見故又我非即是所取蘊亦不是沒有所取我亦不是完全無因為依蘊安立之我是有的又不應說在過去時無有我因為在過去一切生中的彼我與現在的此我非是有自性的體異故問曰前後世的我是有自性地體異答曰那麼無有前世的彼我亦應有現在的此我又前世的我亦應即於前世而住於後世則前世我未死亦應生現世我又前世我的相續則應斷滅而滅等即應失壞又此人作業別人受報並且未作業者應當得果計前世我與現世我異者有如是等過失又此我亦不是先無今有否則即有過失有何過失我應成所作及是無因生故由此看來計過去世中我有無亦有亦無非有非無等見皆不應理因為對於我有我無前面已各別破故又我在未來世中有與無等見為自性有亦不應理破的方式與破過去世中有我無我相同故己二破依前際所生的第二類四見即我與世間是常無常亦常亦無常非常非無常從人生天時天與人二者是有自性地體一耶或體異耶若天與人是體一那麼彼天有法應當是常因為與彼人是自性體一故若許彼天是常那麼彼天有法應成無生其理決定如是何以故常法則不生故又若天與人是有自性地體異則彼人應是無常斷滅而相續即成斷滅其理決定如是何以故若天與人自性體異則不成一相續故問曰無有整體的常和無常的過失因為捨人的身後受天的身故答曰從人生天的補特伽羅有法應成亦常亦無常因為此人就我一分來說是天就身一分來說是人故若許從人生天的補特伽羅是亦常亦無常此亦非理又從人生天的補特伽羅有法是非常非無常亦應無自性由於若亦常亦無常俱能成立固可成立非常非無常但是亦常亦無常不能成立故問曰我是常從無始以來流轉生死故答曰我應非是常因為我從何趣來往何趣去無論到何趣若有自性則應有無始以來流轉生死的我但是彼我是無有故又無常應非有自性何以故常無自性故亦常亦無常和非常非無常皆無有自性因為常與無常二者一一皆無自性故己三破依後際所生的第二類四見即我與世間是有邊無邊亦有邊亦無邊非有邊非無邊應無後世因為汝許世間有邊故又應無後世因為世間無邊不變壞故又世間亦有邊亦無邊不變壞亦不應理何以故諸蘊相續猶如燈焰前滅後生故又世間非有邊因為前蘊壞滅時若不依彼蘊而生此後蘊固可許世間有邊但是前蘊滅時後蘊即生故又世間無邊亦無有自性因為若前蘊不滅不依彼蘊而生此後蘊固可許世間有邊是有自性但是由前蘊生後蘊故又世間應非亦有邊亦無邊因為一分是有邊一分是無邊之事如果真有則世間亦有邊亦無邊固可以有但無此理故又取者一分壞滅一分不壞滅應無此理由於取者一分壞滅一分不壞滅無此事故又所取一分壞滅一分不滅應無此理由於所取一分壞滅一分不滅無有此事故又世間非有邊非無邊應無自性因為若能成立亦有邊亦無邊固可成立非有邊非無邊是有自性但是亦有邊亦無邊非有故戊二通達勝義中息滅一切戲論則不住惡見已說緣起猶如影像斷諸過失復次一切有為法有法彼常等見無論何處於何相續從何因緣生皆無自性何以故自性空故乙三念大師恩德而申敬禮謂敬禮具足大悲為斷一切惡見而宣說正法的大師瞿曇甲四結尾義分二一由何阿闍黎作二由何譯師翻譯乙一由何阿闍黎作此中觀根本慧論頌是建立大乘對法正確顯示勝義諦的真性闡明般若波羅蜜多之理的大阿闍黎聖者龍樹具足大悲和堅定智慧而開顯如來無上乘法者所造楞伽經中佛為龍樹授記云得初歡喜地往生極樂國另大雲經中授記龍樹未來成佛云於極淨光世界成佛號無智生光如來乙二由何譯師翻譯此中論有二十七品共四百四十九頌合為一卷半是印度大寺主甲那戞巴智藏中觀師和西藏比丘覺若龍幢譯師奉吉祥天王制譯其後在迦濕彌羅無比城寶藏寺中由迦濕彌羅大寺主哈蘇馬底和西藏巴草日稱譯師依據月稱論師的明句釋重新校正此後在拉薩竹朗寺中由印度大寺主嘎那嘎和西藏日稱譯師又重新校閲遠離二邊中觀道為自如理修習故中觀根本慧論頌我已如是作解釋開我及一切衆生安乘暇滿大舟航獲得善妙根本寶具足殊勝大吉祥又願未得佛位時諸佛所說一切法依佛密意善受持佛子妙音我願成此中觀根本慧論文句釋寶鬘論是僧成依據聖者文殊長子宗喀巴大師等諸大德的教授於甲寅年六月十四在奈塘大寺中造謹以此善祝願佛教於一切時處興隆久住妙善增長編者按這部寶鬘論是西藏僧成大師造的宗喀巴大師對龍樹菩薩的中觀根本慧論即鳩摩羅什三藏漢文譯出的中論造正理海大疏僧成大師以正理海文字浩瀚初學者有望洋之歎因而就正理海大疏提綱挈要攝取它的文句玄旨以成寶鬘論由常浩翻譯附録明句中論疏歸敬偈疏月稱歸命文殊師利法王子疏主歸敬偈彼捨二邊依住者四一等覺智海得生出解妙法藏本性深復以慈悲稱性述彼四二所述哲見今猶炳光焰盡燒敵見薪又除世心暗彼四三絶智語矢聚烈無餘三有怨敵滅於天與所化世間三界王威八一慶建設於斯龍樹四四我稽首欲造彼頌淨明疏綴言不擾究理風易解正直語義注中論歸敬偈疏今欲說論曰不自不他不共此論攝屬並所詮體用云何於此咨問先如入中論立方軌所示修學無倒般若波羅蜜多方軌軌範師龍樹以無二智所莊嚴方便大悲為先之如來智生因初發心為始迄以悲心覺他故造此論是皆論所攝屬如偈煩惱怨敵悉征御惡趣與有俱防護征防功德故論也此兩於他宗裏無又軌範師自示將欲說此一論所詮體用彼所詮體以顯於無倒而示大威德於不離此威德起行無上師如來願行造論敬禮以故說言不滅不生兮不斷不常兮不一不異兮不來不去兮將是緣起顯等者是即以不滅等八相所相緣起而為論所詮體戲論滅而吉之涅槃示論宗用佛說法中至我今稽首禮云者以示歸敬禮者也上來第一首出兩偈總義自下別釋此兩偈分支語意其中滅者息滅剎那滅謂滅生者生起以自體現起義也斷者斷絶相續斷絶云云義也常者常住於一切時堅固不變云云義也此為一且為義者一義也非別物非種種義也異義者差別義種種義也來者到來在遠方者到近處來去者離去在近處者到遠方去者往義者至義依辭頭力界義變易偈曰界義為辭頭強引於異地加恆河甘流味入大海水故茲末帶辭尾之一語躍然緣至義也一語作現起義故諸法因緣相待生起是緣起義然餘人曰者去也壞也者適去也謂種種重重於是視一語為末帶字緣而作語義分別於種種集聚諸法說彼諸適去壞滅者之現起為生起是即彼等疏釋案彼等所釋所作如此語義分別其撰當符諸比丘當為汝等說緣起見緣起者即見法云云經文所用緣起一語此中得具種種義且具緣起合詞故然今於緣眼及緣諸色而眼識生云云文中則全無種種義所親知者唯一物故曰緣眼者一語以一眼根為因而生一識之生起為眼所向故然若為至義則於一語即於一物未為所知時亦得得謂緣眼至眼待眼以釋故也然如視一語為末具字緣曰緣眼緣諸色而生眼識則是語中既無不變詞連續體親近復無合詞故其辭尾所傳將墮眼壞滅識與諸色之破格然不得有是事是故必以為附於字末成不變詞而作是語義分別然今有人引諸異解而難是曰有人言辭頭具種種重重義具至義而具生起義故合具仗彼彼緣而起彼彼緣至會合而起義有人言一一壞滅諸法生起者緣起此種引述異宗義釋難稱善巧誦為至義者不誦為種種重重義故又不解為至會義故不如是誦解但以為至會義為往義以一語合斯二者解於至義故今緣起一語依如上作至而起者緣起以為語義分別且若欲總所有法入思量以言時則如彼彼因緣聚至會合而起者緣起也云然可與種種重重生緣若但言一法相時則如眼與諸色會合云然以為解而與種種重重毋用緣畢竟以如是故彼論師於引述所破異論終非善巧又如下述亦不應理述云彼釋不當眼識緣眼根與諸色生時無二物至故然如是云云彼難不當云何無至而生因故未陳但立宗故無此宗意趣或如是即識非色性故無緣眼根至會事唯見是色者緣彼色眼至會故然此亦不應理經文此比丘至果中認有至故又以至而云云語與待而為同義異詞故是於軌範師龍樹以緣而語為至而義曰彼彼至而起非從自性起故是故見彼詰難終不契理又立自宗曰此有則彼有此生則彼生云云此處有緣則有果義即緣起義此亦不當於緣起二語各義未明言故而今於此語源不可不疏解故又曰是如林飾為世俗語而作上解此亦不然軌範師於緣起云云語以有各支分義結合意曰彼彼至而起非從自性起故又觀清辨此有則彼有如有短有長云云疏解蓋作同解如云緣短至會短待短而有長如是故同其所難故彼所論理非諦當以上止應成論以如上故世尊開顯諸法生起因緣相待時即由之而遮諸法無因一因異因生義及自他共生義矣又依此遮遣舉示世法實相世法體性今彼世俗緣起非自性生義故令待於聖智則以彼中無滅乃至彼中無去云云不滅等八相所得而相而於彼緣起不滅等一切相軌範師龍樹將以此中論全論說示緣起雖有無盡相唯出此八相者此等成論主體故於諸聖者見緣起實相時具所詮能詮所相能相等相之戲論圓寂故於今戲論寂滅說言唯彼緣起可言戲論滅又彼中無諸心心所轉現息諸能知所知行相言說時則彼處盡捨生老死等害故而吉祥上述所相緣起自說教業言為無上所願事故以業格說示之也即不滅不生兮不斷不常兮不一不異兮不來不去兮將是緣起說戲論滅而吉佛說法中至我今稽首禮又軌範師以如來獨悟上述緣起知如來為無倒論者而諸外論悉是愚衆無義饒舌故遍滿淨信愈益殊崇世尊曰佛說法中至然此中先遮滅者為欲令明生滅無先後定位故是後所說故易陶天譯
